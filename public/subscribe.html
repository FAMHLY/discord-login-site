<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .subscribe-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .subscribe-card .server-icon-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 16px;
    }
    .subscribe-card .tier-name {
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      margin: 0 0 8px 0;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    .subscribe-card .server-name {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin: 0 0 24px 0;
    }
    .subscribe-btn {
      background-color: #7289da;
      color: white;
      padding: 14px 32px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(114, 137, 218, 0.3);
      display: inline-block;
    }
    .subscribe-btn:hover {
      background-color: #5b6fd8;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(114, 137, 218, 0.4);
    }
    .subscribe-error {
      color: rgba(255, 100, 100, 0.9);
      margin-top: 20px;
    }
    .subscribe-loading {
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
    }
    @media (max-width: 768px) {
      .subscribe-card {
        padding: 24px 20px;
        margin: 0 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="subscribe-card" id="subscribe-card">
      <p class="subscribe-loading" id="loading-msg">Loading tier info...</p>
    </div>
  </div>
  <script>
    (async function() {
      const slug = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
      const card = document.getElementById('subscribe-card');
      const loadingMsg = document.getElementById('loading-msg');

      if (!slug) {
        loadingMsg.textContent = 'Invalid link.';
        loadingMsg.className = 'subscribe-error';
        return;
      }

      try {
        const resp = await fetch('/api/tier/' + encodeURIComponent(slug));
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          loadingMsg.textContent = err.error || 'Tier not found.';
          loadingMsg.className = 'subscribe-error';
          return;
        }

        const tier = await resp.json();

        let html = '';
        const iconUrl = tier.serverIcon || 'https://cdn.discordapp.com/embed/avatars/0.png';
        html += '<img class="server-icon-large" src="' + iconUrl + '" alt="Server icon" onerror="this.src=\'https://cdn.discordapp.com/embed/avatars/0.png\'">';
        html += '<p class="tier-name">' + escapeHtml(tier.roleName) + '</p>';
        html += '<p class="server-name">' + escapeHtml(tier.serverName) + '</p>';
        html += '<a class="subscribe-btn" href="/auth/discord?slug=' + encodeURIComponent(slug) + '">Subscribe with Discord</a>';

        card.innerHTML = html;
      } catch (err) {
        console.error('Error loading tier:', err);
        loadingMsg.textContent = 'Failed to load tier info. Please try again.';
        loadingMsg.className = 'subscribe-error';
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
